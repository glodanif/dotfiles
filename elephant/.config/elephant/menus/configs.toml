name = "configs"
name_pretty = "Configs"
icon = "application-x-sharedlib"
action = "ghostty -e sh -c 'cd $(dirname %VALUE%) && nvim %VALUE%; exec $SHELL'"

[[entries]]
text = "Hyprland"
subtext = "hyprland.conf"
value = "~/.config/hypr/hyprland.conf"

[[entries]]
text = "Hyprland | Autostart"
subtext = "autostart.conf"
value = "~/.config/hypr/autostart.conf"

[[entries]]
text = "Hyprland | Keybinds"
subtext = "keybinds.conf"
value = "~/.config/hypr/keybinds.conf"

[[entries]]
text = "Hyprland | Look and feel"
subtext = "look-and-feel.conf"
value = "~/.config/hypr/look-and-feel.conf"

[[entries]]
text = "Hyprland | Apps"
subtext = "programs.conf"
value = "~/.config/hypr/programs.conf"

[[entries]]
text = "Hyprland | Hypridle"
subtext = "hypridle.conf"
value = "~/.config/hypr/hypridle.conf"

[[entries]]
text = "Hyprland | Hyprlock"
subtext = "hyprlock.conf"
value = "~/.config/hypr/hyprlock.conf"

[[entries]]
text = "Hyprland | Hyprpaper"
subtext = "hyprpaper.conf"
value = "~/.config/hypr/hyprpaper.conf"

[[entries]]
text = "Waybar | Style"
subtext = "style.css"
value = "~/.config/waybar/style.css"

[[entries]]
text = "Waybar | Config"
subtext = "config.jsonc"
value = "~/.config/waybar/config.jsonc"

[[entries]]
text = "Walker"
subtext = "config.toml"
value = "~/.config/walker/config.toml"

[[entries]]
text = "Elephant | Menus"
subtext = "/menus"
value = "~/.config/elephant/menus"

[[entries]]
text = ".zshrc"
subtext = ".zshrc"
value = "$HOME/.zshrc"

