###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, W, hy3:killactive,
bind = $mainMod SHIFT, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, F, exec, $fileManager
bind = $mainMod, V, exec, hyprctl dispatch togglefloating active && hyprctl dispatch resizeactive exact 65% 65%
bind = $mainMod ALT, RETURN, fullscreen, 0
bind = $mainMod, SPACE, exec, $menu
# bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, layoutmsg, hy3:togglesplit # dwindle
bind = $mainMod, P, exec, switch-monitors
bind = $mainMod, B, exec, $browser --enable-features=WebRTCPipeWireCapturer --profile-directory=Default
bind = $mainMod, T, exec, $terminal -e $tasks

# Move focus with mainMod + arrow keys
bind = $mainMod, left, hy3:movefocus, l
bind = $mainMod, right, hy3:movefocus, r
bind = $mainMod, up, hy3:movefocus, u
bind = $mainMod, down, hy3:movefocus, d

bind = $mainMod ALT, SPACE, exec, walker --provider menus:main

# TAB between workspaces
bind = SUPER, TAB, hy3:togglefocuslayer

# Move workspaces to other monitors
bindd = SUPER ALT, LEFT, Move workspace to left monitor, movecurrentworkspacetomonitor, l
bindd = SUPER ALT, RIGHT, Move workspace to right monitor, movecurrentworkspacetomonitor, r
bindd = SUPER ALT, UP, Move workspace to up monitor, movecurrentworkspacetomonitor, u
bindd = SUPER ALT, DOWN, Move workspace to down monitor, movecurrentworkspacetomonitor, d

bind = $mainMod SHIFT, left, hy3:movewindow, l, once
bind = $mainMod SHIFT, down, hy3:movewindow, d, once
bind = $mainMod SHIFT, up, hy3:movewindow, u, once
bind = $mainMod SHIFT, right, hy3:movewindow, r, once

bind = $mainMod CONTROL SHIFT, left, hy3:movewindow, l, once, visible
bind = $mainMod CONTROL SHIFT, down, hy3:movewindow, d, once, visible
bind = $mainMod CONTROL SHIFT, up, hy3:movewindow, u, once, visible
bind = $mainMod CONTROL SHIFT, right, hy3:movewindow, r, once, visible

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, hy3:movetoworkspace, 1
bind = $mainMod SHIFT, 2, hy3:movetoworkspace, 2
bind = $mainMod SHIFT, 3, hy3:movetoworkspace, 3
bind = $mainMod SHIFT, 4, hy3:movetoworkspace, 4
bind = $mainMod SHIFT, 5, hy3:movetoworkspace, 5
bind = $mainMod SHIFT, 6, hy3:movetoworkspace, 6
bind = $mainMod SHIFT, 7, hy3:movetoworkspace, 7
bind = $mainMod SHIFT, 8, hy3:movetoworkspace, 8
bind = $mainMod SHIFT, 9, hy3:movetoworkspace, 9
bind = $mainMod SHIFT, 0, hy3:movetoworkspace, 10

bind = $mainMod, d, hy3:makegroup, h
bind = $mainMod, s, hy3:makegroup, v
bind = $mainMod, z, hy3:makegroup, tab
bind = $mainMod, a, hy3:changefocus, raise
bind = $mainMod SHIFT, a, hy3:changefocus, lower
bind = $mainMod, x, hy3:locktab
bind = $mainMod, e, hy3:expand, expand
bind = $mainMod SHIFT, e, hy3:expand, base
bind = $mainMod, r, hy3:changegroup, opposite

bind = $mainMod, i, exec, hyprctl keyword plugin:hy3:tabs:height 20
bind = $mainMod, i, exec, hyprctl keyword plugin:hy3:tabs:render_text true
bind = $mainMod, o, exec, hyprctl keyword plugin:hy3:tabs:height 20
bind = $mainMod, o, exec, hyprctl keyword plugin:hy3:tabs:render_text true

bindr = $mainMod, o, exec, hyprctl keyword plugin:hy3:tabs:height 2
bindr = $mainMod, o, exec, hyprctl keyword plugin:hy3:tabs:render_text false

bind = , Print, exec, take-screenshot
bind = $mainMod SHIFT, V, exec, cliphist list | walker --dmenu | cliphist decode | wl-copy
bind = $mainMod, ESCAPE, exec, power-menu
bind = $mainMod, M, exec, mic-toggle

# Resize active window
bindd = SUPER, code:34, Expand window left, resizeactive, -100 0    # - key
bindd = SUPER, code:35, Shrink window left, resizeactive, 100 0     # = key
bindd = SUPER SHIFT, code:34, Shrink window up, resizeactive, 0 -100
bindd = SUPER SHIFT, code:35, Expand window down, resizeactive, 0 100

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bindn = , mouse_down, hy3:focustab, l, require_hovered
bindn = , mouse_up, hy3:focustab, r, require_hovered
bind = $mainMod, q, hy3:warpcursor

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

bind = , SCROLL_LOCK, exec, voxtype record start
bindr = , SCROLL_LOCK, exec, voxtype record stop

