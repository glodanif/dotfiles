general {
    lock_cmd = hyprlock
    before_sleep_cmd = hyprlock
    after_sleep_cmd = sleep 1 && hyprctl dispatch dpms on
    inhibit_sleep = 3
}

listener {
    timeout = 60
    on-timeout = DISPLAY=:0 launch-screensaver
    on-resume = exit-screensaver
}
listener {
    timeout = 300
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

listener {
    timeout = 600
    on-timeout = hyprlock
}

listener {
    timeout = 1800
    on-timeout = hyprland-power shutdown
}

